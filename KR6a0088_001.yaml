body:
  text: 失譯人名今附宋録聞如是一時佛在舍衛國止城東出有女人子字蕪耶樓人呼為蕪耶樓母佛在蕪耶樓母家殿上坐有一女人奉持教戒字墮舍迦以月十五日朝起沐浴有七子婦皆使沐浴著好衣日未中因飯飯已澡手將七子婦至佛所前為佛作禮佛言就座皆却就座佛問優陂夷墮舍迦今日何等沐浴著好衣與子婦俱至佛所墮舍迦言今日十五日我齊戒我聞一月當六齊我與子婦俱共齊不敢懈慢佛告墮舍迦佛正齊法有八戒使人得度世道不復墮三惡處所生常有福祐亦從八戒本因緣致成佛何等為佛正齊法是間有賢善人持戒一月六日齊月八日一齊十四日一齊十五日一齊二十三日一齊二十九日一齊三十日一齊齊日朝起告家中言今日我身齊家中今一日且莫飲酒莫鬪諍莫道說錢財家中事意所念口所說當如阿羅漢阿羅漢無殺意齊日持戒亦當如阿羅漢無殺意無捶擊意念畜生及蟲蛾使常生如阿羅漢意是為一戒今日與夜持殺意使不得殺持意如是為佛一戒佛言齊日持意當如阿羅漢無貪心無所貪慕於世間無貪毛菜之意齊日如是持意如阿羅漢富有者當念作布施貧無有者常當念施是為二戒佛言齊日持意當如阿羅漢阿羅漢不畜婦亦不念婦亦不貪女人亦無淫意齊日如是持意如阿羅漢是為三戒佛言齊日持意當如阿羅漢不妄語不傷人意語即說佛經不語者但念諸善齊日如是持意如阿羅漢是為四戒佛言齊日持意當如阿羅漢阿羅漢不飲酒不念酒不思酒用酒為惡齊日如是持意如阿羅漢是為五戒佛言齊日持意當如阿羅漢阿羅漢意不在歌舞聞亦不喜音樂聲亦不在香華氣齊日如是持意如阿羅漢是為六戒佛言齊日持意當如阿羅漢阿羅漢不於高好床臥意亦不念高好床上臥齊日如是持意如阿羅漢是為七戒佛言齊日持意當如阿羅漢阿羅漢日中及食日中已後至明不得復食得飲蜜漿齊日如是持意如阿羅漢是為八戒佛復告優陂夷墮舍迦是間有人頭髮有垢自沐其頭沐已其人便喜言我頭垢已去有人持八戒一日一夜者明日即喜喜者便念佛經戒乃如是其有人心中有惡意即去善意即還佛言有人身體饒垢入水中治身垢皆去出水即喜言我垢去身輕其有人齊戒一日一夜明日即喜念佛正語自念當何時得道使我心不復動不復走使我心一志無為之道佛言有人衣多垢以得灰浣之垢去其人即喜其有人齊戒一日一夜明日即喜便念比丘僧言比丘僧中有須陀洹斯陀含阿那含阿羅漢念比丘僧如是佛言如人有鏡鏡有垢磨去其垢鏡即明其有人齊戒一日一夜有慈心於天下心開如明如鏡者不當有瞋怒意其有人一日一夜齊戒閲哀天下淨心自思自端其意自思念身中惡露如是如是者不當復瞋怒佛告優陂夷墮舍迦持八戒齊一日一夜不失者勝持金銀珠璣施與比丘僧也天下有十六大國一者名鴦迦二者名摩竭三者名迦夷四者名拘薛羅五者名鳩溜六者名般闍荼七者名阿波耶八者名阿洹提渝九者名脂提渝十者名越祇渝十一者名速摩十二者名速賴吒十三者名越蹉十四者名末羅十五者名渝匿十六者名劍善提是十六大國中珍寶物施與比丘僧不如齊戒一日一夜也齊戒使人得度世道以財寶施與不能使人得道今我得佛道本從是八戒起佛告墮舍迦天下人多憂家事我用是故使一月六齊持八戒若有賢善人欲急得阿羅漢道者若欲疾得佛道者若欲生天上者能自端其心一其意者一月十五日齊亦善二十日齊亦善人多憂家事故與一月六齊六日齊者譬如海水不可斛量其有齊戒一日一夜者其福不可計佛告墮舍迦且將子婦歸誦念是正齊法八戒也優陂夷墮舍迦前為佛作禮而去
